<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta
      name="description"
      content="Hashlake, a browser-based Bitcoin lake artwork built with Three.js."
    />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Hashlake / Bitcoin Lake</title>
    <style>
      html,
      body,
      #app {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #000102;
        color: #fff6df;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      body {
        position: fixed;
        inset: 0;
      }

      #fallback {
        position: fixed;
        inset: 0;
        z-index: 10;
        display: grid;
        place-items: center;
        overflow: hidden;
        background:
          radial-gradient(circle at 50% 54%, rgba(98, 225, 207, 0.12), transparent 25%),
          linear-gradient(180deg, #000102 0%, #010405 41%, #031014 48%, #000102 100%);
      }

      .fallback-scene__field {
        position: absolute;
        inset: 0;
      }

      .fallback-scene__lake {
        position: absolute;
        right: 0;
        bottom: 0;
        left: 0;
        height: 42%;
        background:
          repeating-linear-gradient(
            175deg,
            rgba(255, 246, 223, 0.055) 0 1px,
            rgba(255, 246, 223, 0) 1px 22px
          ),
          radial-gradient(ellipse at 50% 0%, rgba(137, 243, 223, 0.17), transparent 42%),
          linear-gradient(180deg, #0e4250, #04181e 64%, #010608);
      }

      .fallback-scene__message {
        position: relative;
        z-index: 1;
        display: grid;
        gap: 6px;
        width: min(390px, calc(100vw - 32px));
        padding: 16px 18px;
        border: 1px solid rgba(137, 243, 223, 0.24);
        border-radius: 8px;
        background: rgba(0, 2, 3, 0.92);
        box-shadow: 0 24px 70px rgba(0, 0, 0, 0.74);
      }

      .fallback-scene__message strong {
        font-size: clamp(22px, 5vw, 34px);
        line-height: 1.1;
      }

      .fallback-scene__message em {
        color: #89f3df;
        font-style: normal;
        font-size: 12px;
        font-weight: 850;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .fallback-scene__message span {
        color: rgba(230, 244, 241, 0.72);
        font-size: 14px;
      }

      .fallback-scene--hidden {
        visibility: hidden;
        opacity: 0;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="app" aria-label="Hashlake interactive scene"></div>
    <div id="fallback" class="fallback-scene" role="status" aria-live="polite">
      <div class="fallback-scene__field">
        <div class="fallback-scene__scanline"></div>
        <div class="fallback-scene__horizon"></div>
        <div class="fallback-scene__signal"></div>
        <div class="fallback-scene__waveform">
          <span></span>
          <span></span>
          <span></span>
          <span></span>
          <span></span>
        </div>
        <div class="fallback-scene__lake"></div>
      </div>
      <div class="fallback-scene__message">
        <strong>Listening to the chain.</strong>
        <em>Hashlake</em>
        <span id="fallback-detail">Reading the chain and warming the lake...</span>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
